<!-- 지역 페이지 -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/area/calendar.css" />
    <link rel="stylesheet" href="../css/area/content.css" />
  </head>
  <body>
    <div class="main-container">
      <!-- calendar header -->
      <div class="title-wrapper">
        <div class="title">
          <p><b>전국</b> 축제·행사 어디까지 가봤니?</p>
          <img src="../img/area/plus-btn.png" />
        </div>

        <div class="calendar-title">
          <div class="year-month" id="yearMonth">2025.04</div>
          <div class="middle-line"></div>
        </div>
        <div class="calendar-header-wrapper">
          <img
            src="../img/area/circle-left.svg"
            class="nav-button prev-btn"
            id="prevBtn"
          />
          <div class="calendar-header" id="calendarHeader"></div>
          <img
            src="../img/area/circle-right.svg"
            class="nav-button next-btn"
            id="nextBtn"
          />
        </div>
        <script src="../js/area/calendar.js"></script>
      </div>
      <div class="item-slider-wrapper">
        <div class="item-wrapper">
          <div class="img-wrapper">
            <img src="../img/area/slider/slider-1.jpg" />
          </div>
          <div class="item-content-wrapper">
            <div class="item-title">
              <h3>양재천 벚꽃 등(燈) 축제</h3>
              <span>서울 서초구</span>
            </div>
            <div class="item-content">
              <div class="info-wrapper">
                <div class="info-content">
                  <span>기간</span>
                  <span class="info">2025. 4. 3 ~ 2025. 4. 27.</span>
                </div>
                <div class="info-content">
                  <span>장소</span>
                  <span class="info">서울특별시 서초구 양재동</span>
                </div>
              </div>
              <div class="btn-wrapper">
                <div class="site">바로가기</div>
                <div class="road">길찾기</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
